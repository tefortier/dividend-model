name: Weekly Dividend Screen

on:
  schedule:
    - cron: '0 1 * * 1'  # Every Monday 01:00 UTC = Sunday 8pm CT
  workflow_dispatch:       # Manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-screen:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests numpy

      - name: Run screener
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: python scripts/run_screen.py

      run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dividend_screen.json
          git diff --staged --quiet || git commit -m "Weekly screen update $(date -u +'%Y-%m-%d')"
          git push
