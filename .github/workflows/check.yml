name: Polygon Check
on:
  workflow_dispatch: {}
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: python check.py
